name: "Build AraxMesh Apps"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'desktop-app/package.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Add iOS compilation targets on macOS runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-ios,x86_64-apple-ios' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop-app/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: |
          cd desktop-app
          npm install

      - name: Build Desktop Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "desktop-app"
          releaseDraft: true
          prerelease: false

      # ── iOS Mobile Build (macOS runner only) ────────────────────────
      - name: Initialize and Build iOS App
        if: matrix.platform == 'macos-latest'
        env:
          CI: true
        run: |
          cd desktop-app
          # Initialize iOS project configs in non-interactive mode
          npx tauri ios init
          # Compile the iOS target (unsigned build for sideloading)
          npx tauri ios build -- CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""
          # Package the generated build directories for easy download
          zip -r AraxMesh_iOS_Build.zip src-tauri/gen/apple

      - name: Upload iOS Build Artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AraxMesh_iOS_Build
          path: desktop-app/AraxMesh_iOS_Build.zip
          retention-days: 7
